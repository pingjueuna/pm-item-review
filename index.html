<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PM 리뷰 시스템_ver1.2</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{background:#f5f6f7;font-size:14px}
.card{background:#fff;padding:14px;border-radius:8px;margin-bottom:10px}
.table tbody tr:hover{background:#f9fafb}
</style>
</head>

<body class="p-3">

<h4>PM 문제 리뷰 시스템</h4>

<div class="card">
<textarea id="paste" class="form-control" rows="6"
placeholder="엑셀 전체 복사 → Ctrl+V"></textarea>

<div class="mt-2">
<button class="btn btn-primary btn-sm" onclick="load()">불러오기</button>
<button class="btn btn-success btn-sm" onclick="downloadExcel()">엑셀 다운로드</button>
</div>
</div>

<div class="card">
<table class="table table-hover">
<thead>
<tr>
<th>#</th><th>ID</th><th>제목</th>
<th>연도</th><th>차수</th><th>난이도</th>
<th>Status</th><th>보기</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<script>

// ✅ TSV 파서
function parseTSV(text){
  const rows=[], n=text.length;
  let i=0;
  while(i<n){
    const row=[]; let field=''; let inQ=false;
    while(i<n){
      const c=text[i];
      if(inQ){
        if(c=='"'){
          if(text[i+1]=='"'){field+='"';i+=2;}
          else{inQ=false;i++;}
        }else{field+=c;i++;}
      }else{
        if(c=='"'){inQ=true;i++;}
        else if(c=='\t'){row.push(field);field='';i++;}
        else if(c=='\n'){row.push(field);i++;break;}
        else if(c=='\r'){i++;}
        else{field+=c;i++;}
      }
    }
    if(field!==''||row.length) row.push(field);
    if(row.length) rows.push(row);
  }
  return rows;
}

// ✅ 헤더 normalize (핵심🔥)
function norm(s){
  return s.replace(/\s/g,'').replace(/\n/g,'').trim();
}

let allItems=[];

// ✅ load (완전 수정)
function load(){
  const raw=document.getElementById('paste').value.trim();
  if(!raw){ alert('붙여넣기 필요'); return;}

  const rows=parseTSV(raw);

  const headers=rows[0].map(h=>norm(h));

  function get(key, row){
    const idx = headers.findIndex(h => h.includes(key));
    return idx>-1 ? (row[idx]||'').trim() : '';
  }

  allItems = rows.slice(1).map(r=>({
    itemId: get('문항ID',r),
    year: get('출제연도',r),
    round: get('문항차수',r),
    level: get('난이도',r),
    competency: get('역량명',r),

    title: get('문항제목',r),
    question: get('문제',r),

    answer: get('정답',r),
    explanation: get('해설',r),

    status: get('status',r) || '검토'
  }));

  render();
}

// ✅ table
function render(){
  table.innerHTML = allItems.map((r,i)=>`
<tr>
<td>${i+1}</td>
<td>${r.itemId}</td>
<td>${r.title}</td>
<td>${r.year}</td>
<td>${r.round}</td>
<td>${r.level}</td>
<td>${r.status}</td>
<td><button onclick="showDetail(${i})">보기</button></td>
</tr>
`).join('');
}

// ✅ 상세
function showDetail(i){
  const r=allItems[i];

  alert(
`제목: ${r.title}

문제:
${r.question}

정답: ${r.answer}
`);
}

// ✅ 엑셀 다운로드
function downloadExcel(){
  const data=allItems.map(r=>({
    문항ID:r.itemId,
    출제연도:r.year,
    문항차수:r.round,
    난이도:r.level,
    제목:r.title,
    문제:r.question,
    정답:r.answer,
    해설:r.explanation,
    Status:r.status
  }));

  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"리뷰");

  XLSX.writeFile(wb,"PM_리뷰결과.xlsx");
}

</script>

</body>
</html>
