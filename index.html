<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PM 문제 리뷰 시스템</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body { background:#f4f6fb; font-size:14px;}
.badge-status{padding:3px 8px;border-radius:10px;font-size:12px;}
.badge-status.검토{background:#cff4fc;}
.badge-status.변경{background:#fff3cd;}
.badge-status.확정{background:#d1e7dd;}
.badge-status.전문가확정{background:#0d6efd;color:#fff;}
.section-title{font-weight:bold;margin-bottom:6px;}
textarea{width:100%;}
</style>
</head>

<body class="p-3">

<h4>PM 문제 리뷰 시스템</h4>

<textarea id="paste" placeholder="Excel 붙여넣기"></textarea>
<button onclick="load()">불러오기</button>
<button onclick="downloadExcel()">엑셀다운로드</button>

<table class="table mt-3">
<thead>
<tr>
<th>#</th><th>ID</th><th>제목</th><th>Status</th><th>보기</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<!-- 모달 -->
<div class="modal fade" id="modal" tabindex="-1">
<div class="modal-dialog modal-lg">
<div class="modal-content">
<div class="modal-body" id="modalBody"></div>
</div>
</div>
</div>

<script>

let allItems=[], filteredItems=[];
let showAnswer=false;
let currentIdx=0;

function load(){
  const rows=document.getElementById('paste').value.split("\n").map(r=>r.split("\t"));
  const headers=rows[0];

  allItems=rows.slice(1).map(r=>{
    let obj={};
    headers.forEach((h,i)=>obj[h]=r[i]||'');
    obj.itemId=obj['문항ID']||Math.random();
    return {
      itemId:obj.itemId,
      title:obj['문항제목'],
      question:obj['문제'],
      opt1:obj['보기1'],
      opt2:obj['보기2'],
      opt3:obj['보기3'],
      opt4:obj['보기4'],
      opt5:obj['보기5'],
      answer:obj['정답번호'],
      explanation:obj['정답해설'],
      status:obj['Status']||'검토',
      comment:obj['Comment']||''
    };
  });

  render();
}

function render(){
  filteredItems=allItems;
  document.getElementById('table').innerHTML=
    filteredItems.map((r,i)=>`
<tr>
<td>${i+1}</td>
<td>${r.itemId}</td>
<td>${r.title}</td>
<td>${statusBadge(r.status)}</td>
<td><button onclick="showDetail(${i})">보기</button></td>
</tr>`).join('');
}

function statusBadge(s){
  let cls='검토';
  if(s==='변경') cls='변경';
  else if(s==='확정') cls='확정';
  else if(s==='전문가 확정') cls='전문가확정';
  return `<span class="badge-status ${cls}">${s}</span>`;
}

function updateField(idx,key,val){
  filteredItems[idx][key]=val;
  const id=filteredItems[idx].itemId;
  allItems.find(x=>x.itemId===id)[key]=val;
}

function toggleAnswer(){
  showAnswer=!showAnswer;
  showDetail(currentIdx);
}

function showDetail(idx){
  currentIdx=idx;
  const r=filteredItems[idx];

  const options=[r.opt1,r.opt2,r.opt3,r.opt4,r.opt5].map((o,i)=>`
    <div>
      <label>보기 ${i+1}</label>
      <textarea onchange="updateField(${idx},'opt${i+1}',this.value)">${o||''}</textarea>
    </div>
  `).join('');

  document.getElementById('modalBody').innerHTML=`

  <button onclick="toggleAnswer()">정답보기 ${showAnswer?'OFF':'ON'}</button>

  <div class="section-title">Status</div>
  <select onchange="updateField(${idx},'status',this.value)">
    <option ${r.status==='검토'?'selected':''}>검토</option>
    <option ${r.status==='변경'?'selected':''}>변경</option>
    <option ${r.status==='확정'?'selected':''}>확정</option>
    <option ${r.status==='전문가 확정'?'selected':''}>전문가 확정</option>
  </select>

  <div class="section-title">문제</div>
  <textarea onchange="updateField(${idx},'question',this.value)">${r.question||''}</textarea>

  <div class="section-title">보기</div>
  ${options}

  ${showAnswer?`
  <div class="section-title">정답</div>
  <div>정답: ${r.answer}</div>
  `:''}

  <div class="section-title">해설</div>
  <textarea onchange="updateField(${idx},'explanation',this.value)">${r.explanation||''}</textarea>

  <div class="section-title">리뷰 코멘트</div>
  <textarea onchange="updateField(${idx},'comment',this.value)">${r.comment||''}</textarea>

  `;

  new bootstrap.Modal(document.getElementById('modal')).show();
}

function downloadExcel(){
  const data=allItems.map(r=>({
    문항ID:r.itemId,
    Status:r.status,
    문제:r.question,
    보기1:r.opt1,
    보기2:r.opt2,
    보기3:r.opt3,
    보기4:r.opt4,
    보기5:r.opt5,
    정답번호:r.answer,
    정답해설:r.explanation,
    Comment:r.comment
  }));

  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"sheet1");
  XLSX.writeFile(wb,"PM리뷰결과.xlsx");
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
