<!-- ✅ 중요: 변경된 JS 부분 중심, 기존 코드에 덮어쓰기 -->
<script>

let showAnswer = false;
let currentIdx = 0;

// ✅ 수정 함수
function updateField(idx, key, value){
  const item = filteredItems[idx];
  item[key] = value;

  const target = allItems.find(r => r.itemId === item.itemId);
  if(target){
    target[key] = value;
  }

  item._edited = true;
}

// ✅ 정답 토글
function toggleAnswer(){
  showAnswer = !showAnswer;
  showDetail(currentIdx);
}

// ✅ Status 배지 수정
function statusBadge(s){
  let cls='other';

  if(s==='변경') cls='변경';
  else if(s==='확정') cls='확정';
  else if(s==='전문가 확정') cls='전문가확정';
  else if(s.includes('검토')) cls='검토';

  return `<span class="badge-status ${cls}">${esc(s)}</span>`;
}

// ✅ 상세보기 전체 (핵심 수정됨)
function showDetail(idx){
  currentIdx = idx;
  const r = filteredItems[idx];

  document.getElementById('modal-title').textContent = r.title || '문항 상세';

  const answers = (r.answer || '')
    .split(/[,，、\s]+/)
    .map(a => a.trim())
    .filter(Boolean);

  // ✅ 보기 (정답 숨김)
  const opts = [r.opt1,r.opt2,r.opt3,r.opt4,r.opt5].map((o,i)=>{
    return `
    <div class="mb-2">
      <label style="font-size:12px;font-weight:600;">보기 ${i+1}</label>
      <textarea class="form-control"
        rows="2"
        onchange="updateField(${idx}, 'opt${i+1}', this.value)">${esc(o||'')}</textarea>
    </div>`;
  }).join('');

  document.getElementById('modal-body').innerHTML = `

    <div class="d-flex gap-2 mb-3">
      ${statusBadge(r.status||'')}
      <button class="btn btn-sm btn-outline-primary" onclick="toggleAnswer()">
        정답 보기 ${showAnswer ? 'OFF':'ON'}
      </button>
    </div>

    <!-- ✅ Status 수정 -->
    <div class="mb-3">
      <div class="section-title">Status</div>
      <select class="form-select"
        onchange="updateField(${idx}, 'status', this.value)">
        <option ${r.status==='검토'?'selected':''}>검토</option>
        <option ${r.status==='변경'?'selected':''}>변경</option>
        <option ${r.status==='확정'?'selected':''}>확정</option>
        <option ${r.status==='전문가 확정'?'selected':''}>전문가 확정</option>
      </select>
    </div>

    <!-- ✅ 문제 수정 -->
    <div class="mb-3">
      <div class="section-title">문제</div>
      <textarea class="form-control"
        rows="6"
        onchange="updateField(${idx}, 'question', this.value)">${esc(r.question||'')}</textarea>
    </div>

    <!-- ✅ 보기 수정 -->
    <div class="mb-3">
      <div class="section-title">보기</div>
      ${opts}
    </div>

    <!-- ✅ 정답 (하단 표시) -->
    ${showAnswer ? `
    <div class="mb-3">
      <div class="section-title">정답</div>
      <div class="explanation-box" style="background:#e7f1ff;">
        정답: <b>${esc(r.answer||'-')}</b>
      </div>
    </div>` : ''}

    <!-- ✅ 해설 수정 -->
    <div class="mb-3">
      <div class="section-title">정답 해설</div>
      <textarea class="form-control"
        rows="5"
        onchange="updateField(${idx}, 'explanation', this.value)">${esc(r.explanation||'')}</textarea>
    </div>

    <!-- ✅ 리뷰 코멘트 -->
    <div class="mb-3">
      <div class="section-title">리뷰 코멘트</div>
      <textarea class="form-control"
        rows="3"
        placeholder="리뷰 의견"
        onchange="updateField(${idx}, 'comment', this.value)">${esc(r.comment||'')}</textarea>
    </div>

  `;

  detailModal.show();
}


// ✅ Excel 다운로드
function downloadExcel(){
  const exportData = allItems.map(r => ({
    '문항ID': r.itemId || '',
    'Status': r.status || '',
    '문제': r.question || '',
    '보기1': r.opt1 || '',
    '보기2': r.opt2 || '',
    '보기3': r.opt3 || '',
    '보기4': r.opt4 || '',
    '보기5': r.opt5 || '',
    '정답번호': r.answer || '',
    '정답해설': r.explanation || '',
    'Comment': r.comment || ''
  }));

  const ws = XLSX.utils.json_to_sheet(exportData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "리뷰결과");

  XLSX.writeFile(wb, "PM_문항_리뷰결과.xlsx");
}

</script>
